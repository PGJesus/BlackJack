<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>BlackJack</title>
</head>
<body>
    <div id="dealer"></div>
    <div id="player"></div>
    <input type="text" id="bet" name="bet" placeholder="Enter your bet">
    <input type="button" value="Deal" id="deal" name="deal" onclick="deal()"><br>
    <input type="button" value="Hit" id="hit" name="hit" onclick="hit()"><br>
    <input type="button" value="Stand" id="stand" name="stand" onclick="stand()"><br>
</body>
<script src="script.js"></script>
</html>
